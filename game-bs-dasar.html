<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Benar atau Salah</title>
    <style>
        :root {
            --bg-color: #6B890F;
            --header-color: #900B09;
            --card-color: #F3FEA5;
            --option-color: #F8BC18;
            --yellow-light: #eef296;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: white;
            display: flex;
            justify-content: center;
            min-height: 100dvh;
        }

        .container {
            width: 100%;
            max-width: 360px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Header Style */
        header {
            display: flex;
            align-items: center;
            background-color: var(--header-color);
            margin: -20px -20px 20px -20px;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
        }

        .back-icon {
            font-size: 24px;
            margin-right: 15px;
            cursor: pointer;
        }

        /* Quiz UI Elements */
        .q-number {
            background-color: var(--yellow-light);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .question-card {
            background-color: var(--card-color);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;

        }

        .btn-option {
            background-color: var(--option-color);
            border: none;
            padding: 15px 25px;
            border-radius: 100%;
            font-weight: 800;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            height: 100px;
            width: 150px;
            align-items: center;
            justify-content: center;

        }

        .btn-option.correct {
            background-color: #4CAF50 !important;
            color: white;
        }

        .btn-option.wrong {
            background-color: #f44336 !important;
            color: white;
        }

        .btn-next {
            background-color: var(--yellow-light);
            border: none;
            padding: 12px 40px;
            border-radius: 5px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            visibility: hidden;
            margin: 30px auto;
            display: block;
        }

        /* --- Score Page Styles --- */
        #score-page {
            display: none;
            text-align: center;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .logo-box {
            background: white;
            padding: 10px 40px;
            border-radius: 40px;
            margin-bottom: 30px;
        }

        .logo-box h2 {
            color: #5a2d82;
            margin: 0;
            font-style: italic;
        }

        .congrats-img {
            width: 250px;
            margin-bottom: 30px;
        }

        .result-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: center;
        }

        .result-label {
            background: white;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 900;
            width: 100px;
        }

        .label-benar {
            color: #2ecc71;
        }

        .label-salah {
            color: #e74c3c;
        }

        .result-value {
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: #2ecc71;
        }

        .val-salah {
            color: #e74c3c;
        }

        .btn-finish {
            background: white;
            border: none;
            padding: 15px 60px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-top: 50px;
            cursor: pointer;
        }

        .logo {
            margin-bottom: 20px;
        }

        .teks-pilgan {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="quiz-section">
            <header>
                <a href="cover-bs.html">
                    <div class="back-icon"><img src="img/elemen/back-button.png" alt=""></div>
                </a>
                <div class="teks-pilgan">BENAR ATAU SALAH</div>
            </header>

            <div class="q-number" id="q-number">1.</div>
            <div class="question-card" id="question-text">Memuat soal...</div>
            <div class="options-list" id="options-container"></div>
            <button class="btn-next" id="next-btn" onclick="handleNext()">Soal Berikutnya</button>
        </div>

        <div id="score-page">
            <div>
                <img class="logo" src="img/game-pilgan/logo.png" alt="">
            </div>

            <div class="congrats-img">
                <img src="img/game-pilgan/congrats.png" alt="">
            </div>

            <div class="result-row">
                <div class="result-label label-benar">BENAR</div>
                <div class="result-value val-benar" id="final-benar">0</div>
            </div>

            <div class="result-row">
                <div class="result-label label-salah">SALAH</div>
                <div class="result-value val-salah" id="final-salah">0</div>
            </div>

            <a href="cover-bs.html"><button class="btn-finish">SELESAI</button></a>
        </div>
    </div>

    <audio id="correctSound" src="audio/benar.mp3" preload="auto"></audio>
    <audio id="wrongSound" src="audio/salah.mp3" preload="auto"></audio>
    <audio id="finishSound" src="audio/hasil.mp3" preload="auto"></audio>

    <script>
        const quizData = [
            {
                num: 1,
                q: "Secara etimologi, kata “Arsip” berasal dari bahasa yunani “Archium” yang berarti peti untuk menyimpan sesuatu.",
                options: ["Benar", "Salah"],
                answer: 0 // c
            },
            {
                num: 2,
                q: "Berdasarkan UU No. 23 Tahun 2009, arsip hanya boleh berbentuk kertas dan tidak boleh dalam bentuk media elektronik.",
                options: ["Benar", "Salah"],
                answer: 1 // B
            },
            {
                num: 3,
                q: "Karakteristik arsip yang “Autentik” berarti informasi di dalamnya harus akurat, lengkap, dan dapat diandalkan.",
                options: ["Benar", "Salah"],
                answer: 1 // D
            },
            {
                num: 4,
                q: "Arsip Statis adalah jenis arsip yang digunakan secara langsung dalam perencanaan dan kegiatan operasional sehari-hari.",
                options: ["Benar", "Salah"],
                answer: 1 // C
            },
            {
                num: 5,
                q: "Arsip yang frekuensi penggunaannya sudah mulai menurun tetapi sesekali masih dibutuhkan disebut sebagai Arsip Semi Aktif.",
                options: ["Benar", "Salah"],
                answer: 0 // c
            },
            {
                num: 6,
                q: "Salah satu nilai guna arsip adalah Nilai Fiskal, yaitu arsip yang memiliki kegunaan dalam bidang keuangan, contohnya faktur pajak.",
                options: ["Benar", "Salah"],
                answer: 0 // B
            },
            {
                num: 7,
                q: "Dalam Asas Sentralisasi, pengelolaan arsip dilakukan secara tersebar di setiap unit kerja masing-masing.",
                options: ["Benar", "Salah"],
                answer: 1 // D
            },
            {
                num: 8,
                q: "Keuntungan dari Asas Desentralisasi adalah pelayanan bisa lebih cepat karena dokumen berada di tangan unit yang membutuhkan.",
                options: ["Benar", "Salah"],
                answer: 0 // C
            },
            {
                num: 9,
                q: "Tahapan terakhir dalam siklus hidup arsip adalah “Penciptaan Arsip”.",
                options: ["Benar", "Salah"],
                answer: 1 // c
            },
            {
                num: 10,
                q: "Sistem penyimpanan yang mengelompokkan arsip berdasarkan urutan waktu (tanggal, bulan, atau tahun) disebut Sistem Kronologi.",
                options: ["Benar", "Salah"],
                answer: 0 // B
            },

        ];

        let currentIdx = 0;
        let scoreBenar = 0;
        let scoreSalah = 0;

        function initQuiz() {
            const data = quizData[currentIdx];
            document.getElementById('q-number').innerText = data.num + ".";
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('next-btn').style.visibility = 'hidden';

            // Cek jika soal terakhir
            if (currentIdx === quizData.length - 1) {
                document.getElementById('next-btn').innerText = "SELESAI";
            }

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerHTML = `<span>${opt}</span><span class="status-icon"></span>`;
                btn.onclick = () => checkAnswer(btn, index);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, idx) {
            const correctIdx = quizData[currentIdx].answer;
            const allButtons = document.querySelectorAll('.btn-option');

            // Ambil audio
            const correctSound = document.getElementById('correctSound');
            const wrongSound = document.getElementById('wrongSound');

            // Disable tombol setelah memilih
            allButtons.forEach(btn => btn.style.pointerEvents = 'none');

            if (idx === correctIdx) {
                selectedBtn.classList.add('correct');
                selectedBtn.querySelector('.status-icon').innerText = '✔';
                scoreBenar++;

                // Stop sound lain
                wrongSound.pause();
                wrongSound.currentTime = 0;

                // Mainkan sound benar
                correctSound.pause();
                correctSound.currentTime = 0;
                correctSound.play();

            } else {
                selectedBtn.classList.add('wrong');
                selectedBtn.querySelector('.status-icon').innerText = '✖';

                allButtons[correctIdx].classList.add('correct');
                allButtons[correctIdx].querySelector('.status-icon').innerText = '✔';

                scoreSalah++;

                // Stop sound lain
                correctSound.pause();
                correctSound.currentTime = 0;

                // Mainkan sound salah
                wrongSound.pause();
                wrongSound.currentTime = 0;
                wrongSound.play();
            }

            // Tampilkan tombol next
            document.getElementById('next-btn').style.visibility = 'visible';
        }

        function handleNext() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                initQuiz();
            } else {
                showResults();
            }
        }

        function showResults() {

            const correctSound = document.getElementById('correctSound');
            const wrongSound = document.getElementById('wrongSound');
            const finishSound = document.getElementById('finishSound');

            // Stop sound sebelumnya
            correctSound.pause();
            wrongSound.pause();

            correctSound.currentTime = 0;
            wrongSound.currentTime = 0;

            // Tampilkan halaman hasil
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('score-page').style.display = 'flex';

            document.getElementById('final-benar').innerText = scoreBenar;
            document.getElementById('final-salah').innerText = scoreSalah;

            // Mainkan sound hasil
            setTimeout(() => {
                finishSound.pause();
                finishSound.currentTime = 0;
                finishSound.play();
            }, 200);
        }

        function handleNext() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                initQuiz();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('score-page').style.display = 'flex';
            document.getElementById('final-benar').innerText = scoreBenar;
            document.getElementById('final-salah').innerText = scoreSalah;

            // Mainkan sound
            document.getElementById('finishSound').play();
        }

        initQuiz();
    </script>

</body>

</html>
