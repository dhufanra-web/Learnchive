<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        header {
            background: #81D4FA;
            width: 360px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo {
            height: 60px;
        }

        .back {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .profil {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .foto {
            height: 80px;
            margin: 0;
        }

        h5 {
            margin: 0;
            padding: 10px;
        }

        .bawah {
            height: 90px;
        }
    </style>
</head>

<body>
    <header>
        <div>
            <a class="back" href="home.html"><img src="img/elemen/back-button.png" alt=""></a>
        </div>
        <img class="logo" src="img/dev/logo.png" alt="">
    </header>

    <main>
        <div class="profil">
            <h3>Our Team</h3>

            <img class="foto" src="img/dev/dev-img2.png" alt="">
            <h5>Dhola Cahya Fitri</h5>

            <img class="foto" src="img/dev/dev-img3.png" alt="">
            <h5>Ulfia Az Zahra</h5>

            <img class="foto" src="img/dev/dev-img4.png" alt="">
            <h5>Fanesa Ayu Anggraini</h5>

            <img class="foto" src="img/dev/dev-img5.png" alt="">
            <h5>Rania Azzahra Cahyakamila</h5>
        </div>
    </main>

    <footer>
        <img class="bawah" src="img/dev/bawah.png" alt="">
    </footer>

</body>

</html>
