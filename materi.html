<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #81D4FA;
            width: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        header,
        footer {
            width: 360px;
            margin: 0 auto;
        }

        footer {
            margin: 0 auto;
            margin-top: auto;
        }

        .logo {
            height: 60px;
        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .back {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .kiri {
            margin-right: 9px;
        }

        .kanan {
            margin-left: 9px;
        }

        .materi {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px;
            margin-top: 30px;
        }

        .judul-materi {
            height: 60px;
        }

        .elemen-img {
            height: 86px;
        }

        .bawah {
            height: 77px;
        }
    </style>
</head>

<body>
    <header>
        <a class="back" href="home.html"><img src="img/elemen/back-button.png" alt=""></a>
        <img class="logo" src="img/elemen/logo (2).png" alt="">
    </header>

    <main>
        <div class="materi">
            <img class="judul-materi" src="img/materi/materi-img.png" alt="">
        </div>

        <div class="content">
            <div>
                <a class="kiri" href="pengertian_arsip.html"><img class="elemen-img" src="img/materi/arsip-img3.png" alt=""></a>
                <a class="kanan" href="karakteristik.html"><img class="elemen-img" src="img/materi/karakteristik-img2.png" alt=""></a>
            </div>

            <div>
                <a class="kiri" href="fungsi.html"><img class="elemen-img" src="img/materi/fungsi-img2.png" alt=""></a>
                <a class="kanan" href="nilai.html"><img class="elemen-img" src="img/materi/nilai-img2.png" alt=""></a>
            </div>

            <div>
                <a class="kiri" href="asas.html"><img class="elemen-img" src="img/materi/asas-img2.png" alt=""></a>
                <a class="kanan" href="dharsip.html"><img class="elemen-img" src="img/materi/dharsip-img2.png" alt=""></a>
            </div>

            <div>
                <a class="kiri" href="sistem.html"><img class="elemen-img" src="img/materi/sistem-img2.png" alt=""></a>
                <a class="kanan" href="alat-bahan.html"><img class="elemen-img" src="img/materi/alatbahan-img2.png" alt=""></a>
            </div>
        </div>
    </main>

    <footer>
        <img class="bawah" src="img/elemen/bawah-img.png" alt="">
    </footer>

</body>

</html>
